version: '3.8'

services: 
  db: 
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Marinalva12@12@12@
      MYSQL_DATABASE: estoque_db
    ports: 
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      teste: ["CMD","mysqladmin","ping","-h","root","pMarinalva12@12@12@"]
      interval: 5s
      timeout: 5s
      retries: 10


  app:
    build: .
    container_name: app-estoque
    restart: always
    ports: 
      - "8080:8080"
    depends_on:
      - db
      
volumes:
  db_data: